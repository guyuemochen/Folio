name: release

# M9 — build, sign, and publish Folio installers + the updater manifest.
#
# Two release channels share this workflow:
#   stable  : push tag v0.x.x            → rolling tag `stable-latest`
#   nightly : schedule (daily 03:00 UTC) → rolling tag `nightly-latest`
#
# Each channel publishes to ONE rolling GitHub Release (e.g. `stable-latest`):
# artifacts AND the `latest.json` updater manifest both land there.
# `tauri-apps/tauri-action@v0` does NOT support splitting them across two
# tags, so every build reuses the same rolling release. Caveat: tauri-action
# only creates the rolling git tag + Release on its FIRST run; on every later
# run it merely appends assets and does NOT move the rolling git tag pointer
# or update the Release's name/body/target_commitish. The `finalize-rolling`
# job below closes that gap by PATCHing the git ref and the Release after each
# successful build, so the tag pointer, the release name (e.g. "v0.3.0
# (stable)"), and the assets all stay in sync. The Tauri updater reads
# `latest.json` from each channel's rolling tag.
#
# Code is hosted on GitLab and mirrored to GitHub; this workflow runs on the
# GitHub mirror so it can publish to GitHub Releases. Set up push mirror in
# GitLab: Settings → Repository → Mirror → push to GitHub mirror repo.
#
# Required GitHub repo secrets:
#   TAURI_SIGNING_PRIVATE_KEY          contents of ~/.tauri/folio-updater.key
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD empty (dev key has no password; set if
#                                      you regenerate with a password)
# Optional, for OS-level signing once Q11 is resolved:
#   APPLE_CERTIFICATE / APPLE_CERTIFICATE_PASSWORD / APPLE_ID / APPLE_PASSWORD
#   AZURE_TENANT_ID / AZURE_CLIENT_ID / AZURE_CLIENT_SECRET (Windows Authenticode)

on:
  push:
    tags:
      - 'v*'           # stable (v0.1.0, v0.1.1, ...)
      - 'nightly-*'    # explicit nightly tag
  schedule:
    - cron: '0 3 * * *'  # nightly build at 03:00 UTC
  workflow_dispatch:
    inputs:
      channel:
        description: 'Release channel'
        type: choice
        options: ['stable', 'nightly']
        default: 'stable'

# tauri-action creates the rolling GitHub Release + uploads artifacts via the
# REST API using GITHUB_TOKEN. The token needs `contents: write` (and
# `packages: write` if you ever publish anything to GHCR). Without this block
# the token falls back to the repo default, which is read-only on most repos
# → "Resource not accessible by integration" on create-a-release.
permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target universal-apple-darwin'
          - platform: ubuntu-22.04
            args: ''
          - platform: windows-latest
            args: ''
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Linux system deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - run: pnpm install --frozen-lockfile

      - name: Resolve channel + tag names
        id: chan
        shell: bash
        run: |
          CH="${{ github.event.inputs.channel || '' }}"
          TAG="${GITHUB_REF#refs/tags/}"
          if [ -z "$CH" ]; then
            if [[ "$TAG" == nightly-* ]] || [ "${{ github.event_name }}" = "schedule" ]; then CH=nightly
            else CH=stable; fi
          fi
          ROLLING="$CH-latest"
          DATED="$TAG"
          if [ "$CH" = "nightly" ] && [ -z "$DATED" ]; then
            DATED="nightly-$(date -u +%Y-%m-%d)"
          fi
          echo "channel=$CH"      >> "$GITHUB_OUTPUT"
          echo "rolling=$ROLLING" >> "$GITHUB_OUTPUT"
          echo "dated=$DATED"     >> "$GITHUB_OUTPUT"

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # macOS / Windows OS-level signing (uncomment once Q11 is resolved):
          # APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          # APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          # AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          # AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          # AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
        with:
          # Rolling channel release (e.g. `stable-latest`). Both artifacts and
          # latest.json land here; clients read
          # /releases/download/<channel>-latest/latest.json. Every build
          # overwrites the previous artifacts in this release.
          tagName: ${{ steps.chan.outputs.rolling }}
          releaseName: '${{ steps.chan.outputs.dated }} (${{ steps.chan.outputs.channel }})'
          releaseBody: 'Folio ${{ steps.chan.outputs.channel }} build ${{ steps.chan.outputs.dated }}'
          releaseDraft: false
          prerelease: ${{ steps.chan.outputs.channel != 'stable' }}
          args: ${{ matrix.args }}

  finalize-rolling:
    # tauri-action only creates the rolling tag+release once; on every later
    # build it just appends assets without moving the tag pointer or syncing
    # the release metadata. This job runs after all matrix builds succeed and
    # fixes both: (1) move the rolling git tag to this commit via the git-refs
    # API, (2) PATCH the rolling release so name/body/target_commitish reflect
    # the current build. Without this, the Releases page keeps showing the
    # first-ever version name (e.g. "v0.1.0 (stable)") forever even though the
    # assets and latest.json inside it have moved on.
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - name: Resolve channel + tag names
        id: chan
        shell: bash
        run: |
          CH="${{ github.event.inputs.channel || '' }}"
          TAG="${GITHUB_REF#refs/tags/}"
          if [ -z "$CH" ]; then
            if [[ "$TAG" == nightly-* ]] || [ "${{ github.event_name }}" = "schedule" ]; then CH=nightly
            else CH=stable; fi
          fi
          ROLLING="$CH-latest"
          DATED="$TAG"
          if [ "$CH" = "nightly" ] && [ -z "$DATED" ]; then
            DATED="nightly-$(date -u +%Y-%m-%d)"
          fi
          echo "channel=$CH"      >> "$GITHUB_OUTPUT"
          echo "rolling=$ROLLING" >> "$GITHUB_OUTPUT"
          echo "dated=$DATED"     >> "$GITHUB_OUTPUT"

      - name: Move rolling git tag to this build's commit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          REPO="${{ github.repository }}"
          ROLLING="${{ steps.chan.outputs.rolling }}"
          SHA="${{ github.sha }}"
          # PATCH moves an existing lightweight tag. Fall back to POST (create)
          # for the very first build of a channel where tauri-action has not
          # created the tag yet (defensive — normally build already made it).
          if ! curl -fsSL -X PATCH \
               -H "Authorization: Bearer $GH_TOKEN" \
               -H "Accept: application/vnd.github+json" \
               "https://api.github.com/repos/$REPO/git/refs/tags/$ROLLING" \
               -d "{\"sha\":\"$SHA\"}"; then
            curl -fsSL -X POST \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/$REPO/git/refs" \
              -d "{\"ref\":\"refs/tags/$ROLLING\",\"sha\":\"$SHA\"}"
          fi

      - name: Sync rolling Release metadata
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          REPO="${{ github.repository }}"
          ROLLING="${{ steps.chan.outputs.rolling }}"
          DATED="${{ steps.chan.outputs.dated }}"
          CH="${{ steps.chan.outputs.channel }}"
          SHA="${{ github.sha }}"
          RID=$(curl -fsSL \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$REPO/releases/tags/$ROLLING" | jq -r '.id')
          curl -fsSL -X PATCH \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$REPO/releases/$RID" \
            -d "{
              \"tag_name\":\"$ROLLING\",
              \"target_commitish\":\"$SHA\",
              \"name\":\"$DATED ($CH)\",
              \"body\":\"Folio $CH build $DATED\"
            }"
