name: release

# M9 — build, sign, and publish Folio installers + the updater manifest.
#
# Three release channels share this workflow:
#   stable  : PR merged into `master`     → rolling tag `stable-latest`
#   beta    : PR merged into `dev`        → rolling tag `beta-latest`
#   nightly : schedule (daily 03:00 UTC)  → rolling tag `nightly-latest`
#
# The Tauri updater reads `latest.json` from each channel's rolling tag.
#
# Code is hosted on GitLab and mirrored to GitHub; this workflow runs on the
# GitHub mirror so it can publish to GitHub Releases. Set up push mirror in
# GitLab: Settings → Repository → Mirror → push to GitHub mirror repo.
#
# Required GitHub repo secrets:
#   TAURI_SIGNING_PRIVATE_KEY          contents of ~/.tauri/folio-updater.key
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD empty (dev key has no password; set if
#                                      you regenerate with a password)
# Optional, for OS-level signing once Q11 is resolved:
#   APPLE_CERTIFICATE / APPLE_CERTIFICATE_PASSWORD / APPLE_ID / APPLE_PASSWORD
#   AZURE_TENANT_ID / AZURE_CLIENT_ID / AZURE_CLIENT_SECRET (Windows Authenticode)

on:
  pull_request:
    types: [closed]
    branches: [master, dev]
  schedule:
    - cron: '0 3 * * *'  # nightly build at 03:00 UTC
  workflow_dispatch:
    inputs:
      channel:
        description: 'Release channel'
        type: choice
        options: ['stable', 'beta', 'nightly']
        default: 'stable'

jobs:
  build:
    # Skip when a PR is closed without merging.
    if: github.event_name != 'pull_request' || github.event.pull_request.merged == true
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin --target x86_64-apple-darwin'
          - platform: ubuntu-22.04
            args: ''
          - platform: windows-latest
            args: ''
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Linux system deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - run: pnpm install --frozen-lockfile

      - name: Resolve channel + tag names
        id: chan
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.ref }}"
            if   [ "$BASE" = "master" ]; then CH=stable
            elif [ "$BASE" = "dev" ];     then CH=beta
            else echo "::error::unexpected PR base: $BASE"; exit 1; fi
          elif [ "${{ github.event_name }}" = "schedule" ]; then
            CH=nightly
          else
            CH="${{ github.event.inputs.channel || 'stable' }}"
          fi
          SHA7=$(git rev-parse --short HEAD)
          DATE=$(date -u +%Y-%m-%d)
          VERSION=$(node -p "require('./package.json').version")
          case "$CH" in
            stable)  DATED="v$VERSION" ;;
            beta)    DATED="v$VERSION-beta.$SHA7" ;;
            nightly) DATED="nightly-$DATE" ;;
            *)       DATED="$CH-$SHA7" ;;
          esac
          echo "channel=$CH"        >> "$GITHUB_OUTPUT"
          echo "rolling=$CH-latest" >> "$GITHUB_OUTPUT"
          echo "dated=$DATED"       >> "$GITHUB_OUTPUT"

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # macOS / Windows OS-level signing (uncomment once Q11 is resolved):
          # APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          # APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          # AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          # AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          # AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
        with:
          # Dated release (artifacts land here).
          tagName: ${{ steps.chan.outputs.dated }}
          releaseName: '${{ steps.chan.outputs.dated }} (${{ steps.chan.outputs.channel }})'
          releaseBody: 'Folio ${{ steps.chan.outputs.channel }} build ${{ steps.chan.outputs.dated }}'
          releaseDraft: false
          prerelease: ${{ steps.chan.outputs.channel != 'stable' }}
          # The updater manifest (latest.json) is published/updated under the
          # channel's rolling tag, so all platforms merge into one manifest.
          updaterJsonPreferTagName: ${{ steps.chan.outputs.rolling }}
          args: ${{ matrix.args }}
